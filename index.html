        <div class="dday">
            <div id="ddaym"></div>
            <div id="ddayd"></div>
            <script type="py">
                import datetime
                from dateutil.relativedelta import relativedelta
                from pyscript import document
                #------------------------------------
                SN = datetime.date(2026, 11, 19)  # 수능
                TD = datetime.date.today()  # 오늘

                diff = relativedelta(SN, TD)
                daydday = SN-TD

                ddaym = str(diff.months) + "개월" + str(diff.days) + "일"
                ddayd = "D-" + str(daydday.days)

                document.querySelector("#ddayd").innerHTML = ddayd
                document.querySelector("#ddaym").innerHTML = ddaym
            </script>
        </div>

        <div class="menu">
            <h2 class="menutime">조식</h2>
            <div id="breakfast"></div><br>
            <h2 class="menutime">중식</h2>
            <div id="lunch"></div><br>
            <h2 class="menutime">석식</h2>
            <div id="dinner"></div>
            <script type="py">
                import requests
                from bs4 import BeautifulSoup
                from bs4 import XMLParsedAsHTMLWarning
                import warnings
                import datetime
                from pyscript import document
                warnings.filterwarnings("ignore", category=XMLParsedAsHTMLWarning)

                response = requests.get("https://open.neis.go.kr/hub/mealServiceDietInfo?KEY=cb2606337a0441a7acbbbb5a3f2e9221&ATPT_OFCDC_SC_CODE=Q10&SD_SCHUL_CODE=7140232&MLSV_FROM_YMD=20260720&MLSV_TO_YMD=20260724")
                # print(response.status_code)

                html = response.text
                soup = BeautifulSoup(html, 'html.parser')
                식단 = soup.select('DDISH_NM')
                today = datetime.datetime.today().weekday()

                a=today
                # 0부터 월요일

                none=""
                
                if a <= 4: 
                    b=a+5
                    c=b+5

                    breakfast=식단[a].text
                    lunch=식단[b].text
                    dinner=식단[c].text

                    document.querySelector("#breakfast").innerHTML = breakfast
                    document.querySelector("#lunch").innerHTML = lunch
                    document.querySelector("#dinner").innerHTML = dinner

                elif a==4:
                    breakfast=식단[a].text
                    lunch=식단[b].text

                    document.querySelector("#breakfast").innerHTML = breakfast
                    document.querySelector("#lunch").innerHTML = lunch
                    document.querySelector("#dinner").innerHTML = none
                
                else: 
                    document.querySelector("#breakfast").innerHTML = none
                    document.querySelector("#lunch").innerHTML = none
                    document.querySelector("#dinner").innerHTML = none

                # 28~30설명: https://developer.mozilla.org/ko/docs/Web/API/Element/innerHTML
            </script>
